<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Nico AI</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 400px;
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
}

h1 {
    text-align: center;
}

.chat {
    background: #0f172a;
    padding: 10px;
    border-radius: 10px;
    min-height: 150px;
    margin-bottom: 10px;
}

.user {
    color: #38bdf8;
}

.bot {
    color: #22c55e;
}

input {
    width: 70%;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    color: white;
}
</style>
</head>

<body>

<div class="container">
    <h1>Nico AI</h1>

    <div class="chat">
        {% if mesaj %}
            <p class="user">Sen: {{ mesaj }}</p>
        {% endif %}

        {% if cevap %}
            <p class="bot">Nico: {{ cevap }}</p>
        {% endif %}
    </div>

    <form method="POST">
        <input type="text" name="message" placeholder="Bir sey yaz..." required>
        <button type="submit">Gonder</button>
    </form>

</div>

</body>
</html>
